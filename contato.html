<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <h1>Fale Conosco</h1>
        <p>Dúvidas, sugestões ou parcerias? Envie uma mensagem</p>
    </header>

    <nav aria-label="Navegação Principal">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="curiosidades.html">Curiosidades</a></li>
            <li><a href="modelos.html">Modelos</a></li>
            <li><a href="galeria.html">Galeria</a></li>
            <li><a href="contato.html" class="active">Contato</a></li>
           
        </ul>
    </nav>

    <main>
        <section>
            <h2>Contato</h2>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label prejudices for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
                </div>
                <div class="form-group">
                    <label>Telefone:</label>
                    <input type="tel" name="telefone" placeholder="(67) 99999-9999">
                </div>

                <div class="form-group">
                    <label for="email">E-mail Corporativo ou Pessoal:</label>
                    <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
                </div>

                <div class="form-group">
                    <label>Data de Nascimento:</label>
                    <input type="date" name="data_nascimento">
                </div>

        <p><b>Qual modelo e Marca de veículos que gosta:</b></p>
            <input type="checkbox" name="tipo" value="SUV"> SUV
            <input type="checkbox" name="tipo" value="Sedan"> Sedan
            <input type="checkbox" name="tipo" value="Esportivo"> Esportivo
            <p>Possui veículo?</p>
            <input type="radio" name="veiculo" value="Sim"> Sim
            <input type="radio" name="veiculo" value="Não"> Não
            <label>Marca favorita:</label>
        <select>
            <option>Toyota</option>
            <option>Mercedes-Benz</option>
            <option>BMW</option>
                <option>Tesla</option>
        </select>
        <div class="form-group">
            <label>Mensagem:</label>
            <textarea name="mensagem"></textarea>
        </div>
        <button type="submit">Enviar Messagem
        </button>
    </form>
    </main>
    <footer>
        <p>Todos os direitos reservados.</p>
    </footer>

</body>
</html>
