<body>

    <header>
        <h1>Fale Conosco</h1>

            <li><a href="index.html">Home</a></li>

        </ul>

    <main>
        <section>
            <h2>Contato</h2>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label prejudices for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">E-mail Corporativo ou Pessoal:</label>
                    <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
                </div>

                <div class="form-group">
                    <label for="mensagem">Sua Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Escreva aqui sua dúvida ou comentário..."></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Todos os direitos reservados.</p>
    </footer>

</body>
